name: GitHub-Profile-3D-Contribute

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch:      # Allows you to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contribute
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contribute@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generated 3d contribution graph"
          git push
